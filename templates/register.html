<!DOCTYPE html>
<html>
<head>
    <title>Create Account</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        .box {
            width: 350px;
            margin: 100px auto;   /* 👈 CENTER MAGIC */
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 8px 20px;
        }
        .error {
            color: red;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Create New Account</h2>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post">
        <input type="text" name="acc" placeholder="Account Number" required><br>
        <input type="password" name="pin" placeholder="PIN" required><br>
        <input type="number" name="balance" placeholder="Initial Balance" required><br><br>
        <button type="submit">Register</button>
    </form>

    <br>
    <a href="/signin">Already have account? Sign In</a>
</div>

</body>
</html>
